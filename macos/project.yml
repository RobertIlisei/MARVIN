# xcodegen project manifest — generates MARVIN.xcodeproj on demand.
#
# Why xcodegen instead of checking in the .xcodeproj: project.pbxproj
# is diff-hostile, drifts on every Xcode-side touch, and is the cause
# of most "merge conflict in the Xcode project" pain. xcodegen
# regenerates a clean project from this YAML in <1s. The generated
# .xcodeproj is gitignored.
#
# Bootstrap on a fresh clone:
#   brew install xcodegen
#   cd macos && xcodegen generate
#   open MARVIN.xcodeproj
#
# All locked-in choices come from ADR-0016.

name: MARVIN

# Phase 5b — external Swift packages used by the embedded surfaces.
# Mirror of `dependencies:` in Package.swift; xcodegen and SPM each
# resolve these through their own paths but the wire (URL + version
# constraints) is the same. Drift between the two manifests IS the
# bug — bump versions in both.
packages:
  STTextView:
    url: https://github.com/krzyzanowskim/STTextView.git
    from: 1.0.0
  SwiftTreeSitter:
    url: https://github.com/ChimeHQ/SwiftTreeSitter.git
    from: 0.9.0
  tree-sitter-swift:
    url: https://github.com/alex-pinkus/tree-sitter-swift.git
    branch: with-generated-files
  tree-sitter-typescript:
    url: https://github.com/tree-sitter/tree-sitter-typescript.git
    from: 0.23.0
  tree-sitter-go:
    url: https://github.com/tree-sitter/tree-sitter-go.git
    from: 0.23.0
  tree-sitter-rust:
    url: https://github.com/tree-sitter/tree-sitter-rust.git
    from: 0.23.0
  tree-sitter-json:
    url: https://github.com/tree-sitter/tree-sitter-json.git
    from: 0.24.0
  tree-sitter-html:
    url: https://github.com/tree-sitter/tree-sitter-html.git
    from: 0.23.0
  tree-sitter-c:
    url: https://github.com/tree-sitter/tree-sitter-c.git
    from: 0.23.0
  tree-sitter-cpp:
    url: https://github.com/tree-sitter/tree-sitter-cpp.git
    from: 0.23.0
  tree-sitter-bash:
    url: https://github.com/tree-sitter/tree-sitter-bash.git
    from: 0.23.0

# Top-level options — Apple-shop defaults plus explicit minima.
options:
  bundleIdPrefix: net.marvin
  developmentLanguage: en
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true
  xcodeVersion: "16.0"

# Two settings groups (debug / release) plus shared base. The base
# carries the team-agnostic flags; debug/release tweak optimisation,
# stripping, and signing identity.
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_ENABLE_MODULES: YES
    # Ad-hoc signing for Phase 0 — Gatekeeper warns on first open
    # but the .app runs locally. Real Developer ID + notarization
    # gets wired at the end of Phase 1 once a signing identity is
    # plumbed in (see ADR-0016 §3 — Resolved decisions).
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  # Pure-logic library mirroring Package.swift's MARVINLogic target.
  # Holds helpers with no UI / no @MainActor coupling — context-pressure
  # parsing, Scope-met sentinel, DurationFormat — so MARVINTests can
  # link them (executable targets cannot be linked from another target).
  # The MARVIN app target depends on this so the production code path
  # is the same as the test code path. Drift between this and
  # Package.swift is the bug — keep aligned.
  MARVINLogic:
    # Static library, not a framework. Frameworks need a bundle layout
    # (Info.plist + Versions/A symlink farm) that xcodegen doesn't
    # auto-generate for type:framework targets, and the missing
    # Info.plist crashes the embedded codesign step on Release builds
    # ("bundle format unrecognized, invalid, or unsuitable"). Static
    # link sidesteps the bundle entirely — Swift module emission still
    # happens, so MARVIN can `import MARVINLogic` exactly as before.
    type: library.static
    platform: macOS
    sources:
      - path: MARVINLogic
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES

  # Vendored tree-sitter-yaml. Mirrors the same target in
  # `Package.swift` so the xcodebuild path picks it up. We can't
  # use the upstream `tree-sitter-yaml` SPM package because its
  # Package.swift has a runtime FileManager.fileExists check that
  # drops scanner.c when loaded transitively. Vendoring with an
  # unconditional sources list bypasses the bug.
  # See macos/Vendored/tree-sitter-yaml/SOURCE.md for provenance.
  TreeSitterYAML:
    type: library.static
    platform: macOS
    sources:
      - path: Vendored/tree-sitter-yaml/src
        includes:
          - "parser.c"
          - "scanner.c"
      - path: Vendored/tree-sitter-yaml/bindings/swift/TreeSitterYAML
        # The public header (yaml.h) declaring tree_sitter_yaml().
        # SwiftTreeSitter bridges to it via Language(language: …).
        buildPhase: none
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        # Explicit modulemap. xcodebuild doesn't auto-synthesise one
        # from publicHeadersPath the way swift build does; without
        # this, `import TreeSitterYAML` from MARVIN.swift fails with
        # "no such module" at the xcodebuild Swift compile step even
        # though the static library + C header are present.
        MODULEMAP_FILE: $(SRCROOT)/Vendored/tree-sitter-yaml/bindings/swift/TreeSitterYAML/module.modulemap
        # scanner.c #includes "tree_sitter/parser.h"; the schema
        # files live next to it. src/ needs to be on the header
        # search path for both.
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendored/tree-sitter-yaml/src
          - $(SRCROOT)/Vendored/tree-sitter-yaml/bindings/swift/TreeSitterYAML
        # The C compiler needs to find the schema.*.c files when
        # scanner.c #includes one of them via the YAML_SCHEMA macro.
        # Source list above is files, not the directory — the schema
        # .c files aren't compiled standalone but ARE pulled in by
        # the preprocessor relative to scanner.c, which lives next
        # to them in src/. No extra setting needed for the include
        # resolution because they're siblings.

  # Vendored tree-sitter-markdown — block-level grammar only.
  # Upstream Package.swift depends on the official tree-sitter
  # `swift-tree-sitter` binding; MARVIN pins the ChimeHQ
  # SwiftTreeSitter binding, so the two would collide. Vendoring just
  # the source bypasses the conflict. See SOURCE.md for details.
  TreeSitterMarkdown:
    type: library.static
    platform: macOS
    sources:
      - path: Vendored/tree-sitter-markdown/src
        includes:
          - "parser.c"
          - "scanner.c"
      - path: Vendored/tree-sitter-markdown/bindings/swift/TreeSitterMarkdown
        buildPhase: none
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        MODULEMAP_FILE: $(SRCROOT)/Vendored/tree-sitter-markdown/bindings/swift/TreeSitterMarkdown/module.modulemap
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendored/tree-sitter-markdown/src
          - $(SRCROOT)/Vendored/tree-sitter-markdown/bindings/swift/TreeSitterMarkdown

  # Vendored tree-sitter-python — same FileManager.fileExists upstream
  # bug as YAML. Vendoring with an unconditional sources list bypasses it.
  TreeSitterPython:
    type: library.static
    platform: macOS
    sources:
      - path: Vendored/tree-sitter-python/src
        includes:
          - "parser.c"
          - "scanner.c"
      - path: Vendored/tree-sitter-python/bindings/swift/TreeSitterPython
        buildPhase: none
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        MODULEMAP_FILE: $(SRCROOT)/Vendored/tree-sitter-python/bindings/swift/TreeSitterPython/module.modulemap
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Vendored/tree-sitter-python/src
          - $(SRCROOT)/Vendored/tree-sitter-python/bindings/swift/TreeSitterPython

  MARVIN:
    type: application
    platform: macOS
    dependencies:
      - target: MARVINLogic
      - target: TreeSitterYAML
      - target: TreeSitterMarkdown
      - target: TreeSitterPython
      - package: STTextView
        product: STTextView
      - package: SwiftTreeSitter
        product: SwiftTreeSitter
      - package: tree-sitter-swift
        product: TreeSitterSwift
      - package: tree-sitter-typescript
        product: TreeSitterTypeScript
      - package: tree-sitter-go
        product: TreeSitterGo
      - package: tree-sitter-rust
        product: TreeSitterRust
      - package: tree-sitter-json
        product: TreeSitterJSON
      - package: tree-sitter-html
        product: TreeSitterHTML
      - package: tree-sitter-c
        product: TreeSitterC
      - package: tree-sitter-cpp
        product: TreeSitterCPP
      - package: tree-sitter-bash
        product: TreeSitterBash
    sources:
      - path: MARVIN
        # Resources/ holds AppIcon.icns + the source SVGs (idle /
        # active for menu bar, app for the Dock gradient) + the
        # tree-sitter Queries/ subtree. Exclude from compile sources
        # below; the entries that follow add them as bundle resources.
        excludes:
          - "Resources/**"
      # Top-level resource files (AppIcon.icns, *.svg) FLATTENED into
      # Contents/Resources/. Without this — using `type: folder` on the
      # parent — xcodegen makes the entire Resources/ a folder reference,
      # ending up at Contents/Resources/Resources/AppIcon.icns where
      # CFBundleIconFile=AppIcon and Bundle.main.url(forResource:) can't
      # find them. That's the icon-missing bug v0.1.0 shipped with.
      - path: MARVIN/Resources
        buildPhase: resources
        excludes:
          - "Queries/**"
      # tree-sitter highlight queries — these DO need their directory
      # structure preserved (SyntaxHighlighter loads with subdirectory:
      # "Queries"), so this single subtree gets the folder-reference
      # treatment the parent doesn't. Lands at Contents/Resources/Queries/.
      - path: MARVIN/Resources/Queries
        type: folder
        buildPhase: resources
    # NB: NO `info:` block here. That block is destructive — xcodegen
    # OVERWRITES the file at `info.path` with a barebones plist every
    # time `xcodegen generate` runs, losing CFBundleIconFile,
    # CFBundleIconName, LSApplicationCategoryType, NSAppTransportSecurity,
    # etc. v0.1.0/v0.1.1 shipped with that overwritten plist (no icon
    # reference) which is what made the dock icon disappear after
    # the resource-flattening fix landed. The right path is to point
    # INFOPLIST_FILE at the source plist directly and rely on
    # GENERATE_INFOPLIST_FILE=NO to keep xcodebuild's hands off.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.marvin.macos
        # PRODUCT_NAME is the on-disk bundle name. ADR-0016 retired
        # the original Tauri build; this is the canonical MARVIN.app.
        PRODUCT_NAME: MARVIN
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MARVIN/Info.plist
        # Sandbox is intentionally OFF for Phase 0 — the app talks
        # to the local Node sidecar on loopback (which sandbox would
        # block without entitlements) and Phase 0 isn't App-Store-
        # bound. Re-evaluate at distribution.
        ENABLE_APP_SANDBOX: NO
        # Tell the Swift frontend where to find each vendored
        # grammar's modulemap. Each library target sets MODULEMAP_FILE
        # so it compiles against the right interface, but xcodebuild
        # does NOT auto-propagate that to dependents — the consumer
        # needs explicit include paths to resolve `import TreeSitterX`.
        # SPM's swift build handles this via publicHeadersPath
        # automatically, which is why local `swift build` works. The
        # v0.1.7 release.yml run failed at xcodebuild without this with
        # `error: no such module 'TreeSitterMarkdown'`.
        SWIFT_INCLUDE_PATHS:
          - $(SRCROOT)/Vendored/tree-sitter-yaml/bindings/swift/TreeSitterYAML
          - $(SRCROOT)/Vendored/tree-sitter-markdown/bindings/swift/TreeSitterMarkdown
          - $(SRCROOT)/Vendored/tree-sitter-python/bindings/swift/TreeSitterPython

# A single shared scheme so the project opens cleanly in Xcode and
# has a default Build/Run target. xcodegen generates this if asked.
schemes:
  MARVIN:
    build:
      targets:
        MARVIN: all
    run:
      config: Debug
      askForAppToLaunch: false
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
